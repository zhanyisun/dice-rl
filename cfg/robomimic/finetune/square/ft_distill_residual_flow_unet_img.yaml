defaults:
  - _self_
hydra:
  run:
    dir: ${logdir}
  job:
    chdir: false
_target_: agent.finetune.train_distill_residual_flow_img_agent.TrainDistillResidualFlowImgAgent

name: ${env_name}_ft_distill_residual_flow_unet_img_ta${horizon_steps}_fl${flow_steps}
logdir: log_dir/robomimic-finetune/${name}/${now:%Y-%m-%d}_${now:%H-%M-%S}_${seed}
# Path to pretrained image-based flow matching policy (update with your actual path)
base_policy_path: log_dir/robomimic-pretrain/pretrained_bc_policy_square_img/checkpoint/state_2000.pt
robomimic_env_cfg_path: cfg/robomimic/env_meta/${env_name}-img.json
normalization_path: data_dir/robomimic/${env_name}-img/ph_pretrain/normalization.npz

seed: 42
device: cuda:0
env_name: square
run_eval: true  # Enable evaluation environments and periodic evaluation during training
# Original dimensions before visual feature merging
obs_dim: 9  # Low-dim state dimension (will be augmented in agent by adding visual features)
action_dim: 7  # Changed from 7 to 10 for 6D rotation representation
use_6d_rot: false  # Enable 6D rotation representation
abs_action: false  # Use absolute actions (required for 6D rotation)
flow_steps: 10
cond_steps: 1
img_cond_steps: 1
horizon_steps: 4
act_steps: 4
noise_dim: 28  # action_dim * horizon_steps = 7 * 4 = 28

env:
  n_envs: 8
  name: ${env_name}
  best_reward_threshold_for_success: 1
  max_episode_steps: 400
  save_video: False
  use_image_obs: true
  specific:  # Pass additional parameters to environment creation
    abs_action: ${abs_action}
    use_6d_rot: ${use_6d_rot}
  wrappers:
    robomimic_image:
      normalization_path: ${normalization_path}
      success_steps_before_termination: 1
      # Image observation keys for visual encoder (matching pretraining)
      image_keys: [
                   'agentview_image',
                   'robot0_eye_in_hand_image'
                   ]
      low_dim_keys: ['robot0_eef_pos',
                    'robot0_eef_quat',
                    'robot0_gripper_qpos']
      shape_meta: ${shape_meta}
      use_6d_rot: ${use_6d_rot}  # Pass 6D rotation flag to wrapper
      # Visual feature extraction settings for finetuning
      # use_visual_features and pretrained_model will be set by TrainDistillFlowImgAgent
      # device: ${device}
    multi_step:
      n_obs_steps: ${cond_steps}
      n_action_steps: ${act_steps}
      max_episode_steps: ${env.max_episode_steps}
      reset_within_step: True
      gamma: ${train.gamma}

# Shape metadata for visual observations (matching pretraining)
shape_meta:
  obs:
    rgb:
      shape: [96, 96, 6]  # 4 cameras × 3 RGB channels, not counting img_cond_steps
    state:
      shape: [9]  # proprioceptive state dimension per timestep
  action: 
    shape: [7]  # 10D actions for 6D rotation representation

wandb:
  entity: null
  project: robomimic-${env_name}-distill-residual-flow-img-final
  run: ${now:%Y-%m-%d_%H-%M-%S_%f}_${name}

train:
  num_train_steps: 150000  # Total number of environment steps
  val_freq: 10
  n_steps: 100
  n_train_itr: 1000
  batch_size: 256
  eval_freq: 1000 # Evaluate every N steps
  gamma: 0.99
  tau: 0.01
  update_freq: 1
  gradient_steps: 20
  # Learning rates
  actor_lr: 1e-4
  critic_lr: 1e-4
  # Weight decay
  actor_weight_decay: 1e-5
  critic_weight_decay: 1e-5
  
  # Learning rate scheduler
  use_lr_scheduler: True
  lr_scheduler:
    first_cycle_steps: 1000
    warmup_steps: 10
    min_lr: 1e-6
  
  # Target networks
  actor_update_freq: 2
  critic_target_update_freq: 2
  
  save_model_freq: 100
  render:
    freq: 1
    num: 0  # Save videos from first 2 environments per episode
  
  # Logging
  log_freq: 1
  max_grad_norm: 1.0

# Replay buffer settings  
replay_buffer:
  max_size: 2000000
  # N-step returns
  use_n_step: true  # Whether to use n-step returns
  n_step: 3  # Number of steps for n-step returns
  # Expert dataset n-step settings (can differ from online data)
  expert_use_n_step: ${expert_dataset.use_n_step}  # Use expert dataset's n-step setting
  expert_n_step: ${expert_dataset.n_step}  # Use expert dataset's n-step value

# RLPD (Reinforcement Learning with Prior Data) settings
use_rlpd: true  # Enable RLPD symmetric sampling (set to false for regular replay buffer)
expert_ratio: 0.3  # Initial/fixed expert ratio (ignored if use_adaptive_expert_ratio=true)

# Adaptive expert ratio settings
use_adaptive_expert_ratio: true
adaptive_expert_ratio_start: 0.5
adaptive_expert_ratio_end: 0.1
adaptive_expert_ratio_steps: 10000

model:
  _target_: model.rl.distill_residual_rl_img.DistillResidualRLImgModel
  obs_dim: ${obs_dim}  # Will be augmented by agent
  action_dim: ${action_dim}
  noise_dim: ${noise_dim}
  cond_steps: ${cond_steps}
  horizon_steps: ${horizon_steps}
  device: ${device}
  
  # Residual conditioning: condition residual on base action instead of noise  
  condition_residual_on_base_action: false  # Set to true for r_θ(s, a_base) instead of r_θ(s, z)
  num_multi_z_for_actor_loss: 16  # Number of noise samples 

  # N-step returns
  use_n_step: ${replay_buffer.use_n_step}  # Whether to use n-step returns
  n_step: ${replay_buffer.n_step}  # Number of steps for n-step returns
  
  # Pretrained flow matching policy path
  pretrained_flow_policy_path: ${base_policy_path}
  
  # Network configurations - reasonable size for stability
  actor_hidden_dims: [1024, 1024, 1024]    # Residual actor: r_θ(s,z)
  critic_hidden_dims: [1024, 1024, 1024]   # Critic: Q(s,z,a) - input: s + z + a
  activation_type: "GELU"
  # Layer normalization (RLPD paper recommendation)
  use_layernorm: true
  # Loss coefficients - bc_loss_weight used for residual regularization
  bc_loss_weight: 50.0  # Used for ||r_θ(s,z)||² regularization in residual RL
  critic_weight: 1.0
  use_soft_q_filtering: false  # Enable soft Q-filtering for higher performance
  q_filtering_warmup_steps: 3000
  q_underestimation_threshold: -0.25  # Threshold for Q underestimation detection
  replay_flow_warmup_steps: 3000
  # q normalization
  use_q_normalization: true # this has to be true
  # Disable Q loss for expert data samples (ablation study)
  disable_q_loss_for_expert_data: true  # Set to true to disable Q loss for expert data
  # Always retain BC loss for expert data
  always_retain_bc_loss_for_expert_data: true  # If true, bc_filter=1 for expert data regardless of Q-filtering
  # Q-function noise dependency
  multi_sample_next_noise: true  # Use multiple samples for next noise (if applicable)
  num_next_noise_samples: 4  # Number of samples for next noise (K in the paper)
  # Critic ensemble settings
  critic_ensemble_size: 10  # Number of critic networks for reduced overestimation bias
  
# Expert dataset for pretraining and RLPD (with visual features)
expert_dataset:
  _target_: agent.dataset.sequence.StitchedSequenceQLearningDataset
  dataset_path: data_dir/robomimic/${env_name}-img/ph_finetune/train.npz
  horizon_steps: ${horizon_steps}
  cond_steps: ${cond_steps}
  img_cond_steps: ${img_cond_steps}
  device: ${device}
  discount_factor: ${train.gamma}
  gamma: ${train.gamma}  # Discount for horizon aggregation
  max_n_episodes: 50
  use_img: true  # Enable image data loading
  success_steps_for_termination: ${env.wrappers.robomimic_image.success_steps_before_termination}  # Match online env
  use_n_step: true
  n_step: 3
  use_6d_rot: ${use_6d_rot}  # Pass 6D rotation flag to dataset
  abs_action: ${abs_action}  # Pass absolute action flag to dataset

# Visualization settings
visualize_trajectories: false  # Enable trajectory visualization
visualization_freq: 200000000  # Create visualizations every N steps
num_eval_episodes: 30
eval_n_envs: 10  # Number of parallel environments for evaluation (training uses env.n_envs=4)

# Q-value overestimation analysis
log_q_overestimation: true  # Enable Q-value overestimation logging

# Exploration strategy settings
# Valid strategy names: ["standard", "max_q_min", "max_q_std", "max_q_std_filtered_by_min"]
# - "standard": Sample single action with random noise
# - "max_q_min": Sample multiple actions, select one with maximum of minimum Q-values across ensemble
# - "max_q_std": Sample multiple actions, select one with maximum Q-std across ensemble
# - "max_q_std_filtered_by_min": Sample multiple actions, filter by min Q threshold, then select max Q-std

online_explore_strategy: "max_q_min"  # Strategy for online data collection during training
evaluate_strategy: "max_q_min"  # Strategy for evaluation episodes
num_exploration_samples: 16  # Number of action samples for multi-sample strategies
