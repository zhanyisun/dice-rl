defaults:
  - _self_
hydra:
  run:
    dir: ${logdir}
_target_: agent.finetune.train_distill_residual_flow_agent.TrainDistillResidualFlowAgent

name: ${env_name}_ft_distill_residual_flow_mlp_ta${horizon_steps}_fl${flow_steps}
logdir: ${oc.env:DICE_RL_LOG_DIR}/pusht-finetune/${name}/${now:%Y-%m-%d}_${now:%H-%M-%S}_${seed}
base_policy_path: /store/real/zhanyis/dice-rl/log_dir/pusht-pretrain/pusht_pre_flow_matching_mlp_ta4_td10/2026-01-01_02-33-39_42/checkpoint/state_4000.pt
normalization_path: /store/real/zhanyis/dice-rl/data_dir/pusht/processed/normalization.npz

seed: 42
device: cuda:0
env_name: pusht
obs_dim: 5
action_dim: 2
flow_steps: 10
cond_steps: 1
horizon_steps: 4
act_steps: 4
noise_dim: 8  # action_dim * horizon_steps = 2 * 4 = 8 for chunked actions

env:
  n_envs: 4
  name: ${env_name}
  env_type: pusht
  best_reward_threshold_for_success: 1
  max_episode_steps: 300
  save_video: false
  success_threshold: 0.7695
  # success_threshold: 0.85
  wrappers:
    pusht_state:
      normalization_path: ${normalization_path}
      success_threshold: ${env.success_threshold}
    multi_step:
      n_obs_steps: ${cond_steps}
      n_action_steps: ${act_steps}
      max_episode_steps: ${env.max_episode_steps}
      reset_within_step: True
      gamma: ${train.gamma}

wandb:
  entity: ${oc.env:DICE_RL_WANDB_ENTITY}
  project: pusht-distill-residual-flow-state
  run: ${now:%Y-%m-%d_%H-%M-%S_%f}_${name}

train:
  num_train_steps: 150000  # Total number of environment steps
  val_freq: 10
  n_steps: 200
  n_train_itr: 1000
  batch_size: 256
  eval_freq: 1000 # Evaluate every N steps
  gamma: 0.99
  tau: 0.01
  update_freq: 1
  gradient_steps: 10  # Increase critic updates when expert_ratio is low

  
  # Learning rates - smaller for finetuning
  actor_lr: 1e-4
  critic_lr: 1e-4  # Much smaller to prevent Q-value explosion
  
  # Weight decay
  actor_weight_decay: 1e-5
  critic_weight_decay: 1e-5
  
  # Learning rate scheduler
  use_lr_scheduler: True
  lr_scheduler:
    first_cycle_steps: 1000
    warmup_steps: 10
    min_lr: 1e-6
  
  # Target networks
  actor_update_freq: 2
  critic_target_update_freq: 2
  
  save_model_freq: 100
  render:
    freq: 1
    num: 0  # Save videos from first 2 environments per episode
  
  # Logging
  log_freq: 1
  max_grad_norm: 1.0

# Replay buffer settings  
replay_buffer:
  max_size: 5000000
  # N-step returns
  use_n_step: true  # Whether to use n-step returns
  n_step: 3  # Number of steps for n-step returns
  # Expert dataset n-step settings (can differ from online data)
  expert_use_n_step: ${expert_dataset.use_n_step}  # Use expert dataset's n-step setting
  expert_n_step: ${expert_dataset.n_step}  # Use expert dataset's n-step value

# RLPD (Reinforcement Learning with Prior Data) settings
use_rlpd: true  # Enable RLPD symmetric sampling (set to false for regular replay buffer)
expert_ratio: 0.3  # Initial/fixed expert ratio (ignored if use_adaptive_expert_ratio=true)

# Adaptive expert ratio settings
use_adaptive_expert_ratio: true  # Enable adaptive expert ratio scheduling
adaptive_expert_ratio_start: 0.9  # Start with 90% expert data after pretraining
adaptive_expert_ratio_end: 0.1    # Decay to 10% expert data
adaptive_expert_ratio_steps: 10000  # Number of env steps for linear decay (K)



model:
  _target_: model.rl.distill_residual_rl.DistillResidualRLModel
  obs_dim: ${obs_dim}
  action_dim: ${action_dim}
  noise_dim: ${noise_dim}
  cond_steps: ${cond_steps}
  horizon_steps: ${horizon_steps}
  device: ${device}

  
  # Residual conditioning: condition residual on base action instead of noise  
  condition_residual_on_base_action: false  # Set to true for r_θ(s, a_base) instead of r_θ(s, z)

  num_multi_z_for_actor_loss: 4  # Number of noise samples 

  
  # N-step returns
  use_n_step: ${replay_buffer.use_n_step}  # Whether to use n-step returns
  n_step: ${replay_buffer.n_step}  # Number of steps for n-step returns
  
  # Pretrained flow matching policy path (simplified loading)
  pretrained_flow_policy_path: ${base_policy_path}
  
  # Network configurations - smaller for PushT
  actor_hidden_dims: [256, 256, 256]    # Residual actor: r_θ(s,z)
  critic_hidden_dims: [256, 256, 256]   # Critic: Q(s,z,a) - input: s + z + a

  activation_type: "GELU"
  # Layer normalization (RLPD paper recommendation)
  use_layernorm: true
  

  


  
  # Loss coefficients - bc_loss_weight used for residual regularization
  bc_loss_weight: 50.0  # Used for ||r_θ(s,z)||² regularization in residual RL


  critic_weight: 1.0
  

  use_soft_q_filtering: false  # Use soft Q-filtering

  q_filtering_warmup_steps: 6000
  q_underestimation_threshold: -0.65 # Threshold for Q underestimation detection


  # q normalization
  use_q_normalization: true # this has to be true
  
  # Disable Q loss for expert data samples (ablation study)
  disable_q_loss_for_expert_data: true  # Set to true to disable Q loss for expert data
  

  
  # Always retain BC loss for expert data
  always_retain_bc_loss_for_expert_data: true  # If true, bc_filter=1 for expert data regardless of Q-filtering
  
  # Q-function noise dependency
  multi_sample_next_noise: true  # Use multiple samples for next noise (if applicable)
  num_next_noise_samples: 4  # Number of samples for next noise (K in the paper)

  

  
  # Critic ensemble settings
  critic_ensemble_size: 10  # Number of critic networks for reduced overestimation bias
  

  

  


# Expert dataset for pretraining and RLPD
expert_dataset:
  _target_: agent.dataset.sequence.StitchedSequenceQLearningDataset
  dataset_path: /store/real/zhanyis/dice-rl/data_dir/pusht/processed_truncated_1/train.npz
  horizon_steps: ${horizon_steps}
  cond_steps: ${cond_steps}
  device: ${device}
  discount_factor: ${train.gamma}  # Use same gamma as training
  gamma: ${train.gamma}  # Discount for horizon aggregation
  max_n_episodes: 50
  use_img: false  # State-based for this config
  success_steps_for_termination: 1  # PushT terminates immediately on success
  use_n_step: true
  n_step: 3

# Visualization settings
visualize_trajectories: false  # Enable trajectory visualization
visualization_freq: 200000000  # Create visualizations every N steps
num_eval_episodes: 30
eval_n_envs: 10  # Number of parallel environments for evaluation

# Q-value overestimation analysis
log_q_overestimation: true  # Enable Q-value overestimation logging

# Upsampling settings - collect and use all intermediate timesteps


# Exploration strategy settings
# Valid strategy names: ["standard", "max_q_min", "max_q_std", "max_q_std_filtered_by_min"]
online_explore_strategy: "max_q_min"  # Strategy for online data collection during training
evaluate_strategy: "max_q_min"  # Strategy for evaluation episodes
num_exploration_samples: 16  # Number of action samples for multi-sample strategies
