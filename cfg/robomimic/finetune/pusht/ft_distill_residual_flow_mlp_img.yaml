defaults:
  - _self_
hydra:
  run:
    dir: ${logdir}
  job:
    chdir: false
_target_: agent.finetune.train_distill_residual_flow_img_agent.TrainDistillResidualFlowImgAgent

name: ${env_name}_ft_distill_residual_flow_unet_img_ta${horizon_steps}_fl${flow_steps}
logdir: ${oc.env:DICE_RL_LOG_DIR}/pusht-finetune/${name}/${now:%Y-%m-%d}_${now:%H-%M-%S}_${seed}
# base_policy_path: /store/real/zhanyis/dice-rl/log_dir/pusht-pretrain/pusht_pre_flow_matching_mlp_img_ta4_td10/2026-01-01_23-14-36_42/checkpoint/state_3600.pt
base_policy_path: /store/real/zhanyis/dice-rl/log_dir/pusht-pretrain/pusht_pre_flow_matching_mlp_img_ta4_td10/2026-01-04_00-58-22_42/checkpoint/state_5200.pt
normalization_path: /store/real/zhanyis/dice-rl/data_dir/pusht/processed/normalization.npz

seed: 42
device: cuda:0
env_name: pusht
# PushT image observations: 2D agent pos + image features
obs_dim: 2  # Agent position only in image mode (will be augmented with visual features)
action_dim: 2  # 2D target position
flow_steps: 10
cond_steps: 1
img_cond_steps: 1
horizon_steps: 4
act_steps: 4
noise_dim: 8  # action_dim * horizon_steps = 2 * 4 = 8

env:
  n_envs: 4
  name: ${env_name}
  env_type: pusht
  best_reward_threshold_for_success: 1
  max_episode_steps: 300
  save_video: true
  success_threshold: 0.7695
  use_image_obs: true  # Enable image observations
  wrappers:
    pusht_image:
      normalization_path: ${normalization_path}
      success_threshold: ${env.success_threshold}
      render_hw: [96, 96]  # Image resolution
      clamp_obs: false
    multi_step:
      n_obs_steps: ${cond_steps}
      n_action_steps: ${act_steps}
      max_episode_steps: ${env.max_episode_steps}
      reset_within_step: True
      gamma: ${train.gamma}

# Shape metadata for PushT visual observations
shape_meta:
  obs:
    rgb:
      shape: [96, 96, 3]  # Single camera RGB image
    state:
      shape: [2]  # Agent position only
  action: 
    shape: [2]  # 2D target position

wandb:
  entity: ${oc.env:DICE_RL_WANDB_ENTITY}
  project: pusht-distill-residual-flow-img
  run: ${now:%Y-%m-%d_%H-%M-%S_%f}_${name}

train:
  num_train_steps: 150000  # Total number of environment steps
  val_freq: 10
  n_steps: 200
  n_train_itr: 1000
  batch_size: 256
  eval_freq: 1000  # Evaluate every N steps
  gamma: 0.99
  tau: 0.01
  update_freq: 1
  gradient_steps: 10  # Gradient steps per environment step

  
  # Learning rates - smaller for finetuning
  actor_lr: 1e-4
  critic_lr: 1e-4
  
  # Weight decay
  actor_weight_decay: 1e-5
  critic_weight_decay: 1e-5
  
  # Learning rate scheduler
  use_lr_scheduler: True
  lr_scheduler:
    first_cycle_steps: 1000
    warmup_steps: 10
    min_lr: 1e-6
  
  # Target networks
  actor_update_freq: 2
  critic_target_update_freq: 2
  
  save_model_freq: 100
  render:
    freq: 4
    num: 4  # Save videos from environments
  
  # Logging
  log_freq: 1
  max_grad_norm: 1.0

# Replay buffer settings  
replay_buffer:
  max_size: 5000000
  # N-step returns
  use_n_step: true
  n_step: 3
  # Expert dataset n-step settings
  expert_use_n_step: ${expert_dataset.use_n_step}
  expert_n_step: ${expert_dataset.n_step}

# RLPD (Reinforcement Learning with Prior Data) settings
use_rlpd: true  # Enable RLPD symmetric sampling
expert_ratio: 0.3  # Initial/fixed expert ratio

# Adaptive expert ratio settings
use_adaptive_expert_ratio: true  # Enable adaptive expert ratio scheduling
adaptive_expert_ratio_start: 0.5  # Start with 90% expert data
adaptive_expert_ratio_end: 0.1    # Decay to 10% expert data
adaptive_expert_ratio_steps: 10000  # Number of env steps for linear decay




model:
  _target_: model.rl.distill_residual_rl_img.DistillResidualRLImgModel
  obs_dim: ${obs_dim}  # Will be augmented by agent with visual features
  action_dim: ${action_dim}
  noise_dim: ${noise_dim}
  cond_steps: ${cond_steps}
  horizon_steps: ${horizon_steps}
  device: ${device}
  
  
  # Residual conditioning
  condition_residual_on_base_action: false

  num_multi_z_for_actor_loss: 4

  
  # N-step returns
  use_n_step: ${replay_buffer.use_n_step}
  n_step: ${replay_buffer.n_step}
  
  # Pretrained flow matching policy path
  pretrained_flow_policy_path: ${base_policy_path}
  
  # Network configurations - smaller for PushT than robomimic
  actor_hidden_dims: [1024, 1024, 1024]    # Residual actor
  critic_hidden_dims: [1024, 1024, 1024]   # Critic
  activation_type: "GELU"
  # Layer normalization
  use_layernorm: true

    
  # Loss coefficients
  bc_loss_weight: 25.0  # Residual regularization

  critic_weight: 1.0

  use_soft_q_filtering: false

  q_filtering_warmup_steps: 4000
  q_underestimation_threshold: -0.4
  

  
  # Q normalization
  use_q_normalization: true
  
  # Disable Q loss for expert data
  disable_q_loss_for_expert_data: true
  
  # Always retain BC loss for expert data
  always_retain_bc_loss_for_expert_data: true
  
  multi_sample_next_noise: true
  num_next_noise_samples: 4

  
  # Critic ensemble settings
  critic_ensemble_size: 10

# Expert dataset for pretraining and RLPD (with visual features)
expert_dataset:
  _target_: agent.dataset.sequence.StitchedSequenceQLearningDataset
  dataset_path: /store/real/zhanyis/dice-rl/data_dir/pusht/processed_truncated_1/train.npz
  horizon_steps: ${horizon_steps}
  cond_steps: ${cond_steps}
  img_cond_steps: ${img_cond_steps}
  device: ${device}
  discount_factor: ${train.gamma}
  gamma: ${train.gamma}
  max_n_episodes: 50
  use_img: true  # Enable image data loading
  success_steps_for_termination: 1  # PushT terminates immediately on success
  use_n_step: true
  n_step: 3
  state_dim_override: 2

# Visualization settings
visualize_trajectories: false
visualization_freq: 200000000
num_eval_episodes: 10
eval_n_envs: 30

# Q-value overestimation analysis
log_q_overestimation: true

# Exploration strategy settings
online_explore_strategy: "max_q_min"
evaluate_strategy: "max_q_min"
num_exploration_samples: 16
