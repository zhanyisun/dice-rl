defaults:
  - _self_
hydra:
  run:
    dir: ${logdir}
_target_: agent.pretrain.train_flow_matching_img_agent.TrainFlowMatchingImgAgent

name: ${env_name}_pre_flow_matching_mlp_img_ta${horizon_steps}_td${flow_steps}
logdir: ${oc.env:DICE_RL_LOG_DIR}/robomimic-pretrain/${name}/${now:%Y-%m-%d}_${now:%H-%M-%S}_${seed}
robomimic_env_cfg_path: cfg/robomimic/env_meta/${env_name}-img.json
train_dataset_path: data_dir/robomimic/${env_name}-img/ph_pretrain/train.npz
normalization_path: data_dir/robomimic/${env_name}-img/ph_pretrain/normalization.npz

seed: 42
device: cuda:0
env_name: tool_hang
obs_dim: 9  # proprioception only (not including visual features)
action_dim: 7  # 10D for 6D rotation, 7D for axis-angle (set manually based on use_6d_rot), default is 7
use_6d_rot: false  # Set to true to use 6D rotation representation (10D actions), default is false.
abs_action: false  # Whether actions are absolute poses (true) or deltas (false). Set true when using absolute action dataset, default is false.
flow_steps: 20
horizon_steps: 8
cond_steps: 1
img_cond_steps: 1
act_steps: 8

env:
  n_envs: 20
  name: ${env_name}
  best_reward_threshold_for_success: 1
  max_episode_steps: 700
  save_video: true
  use_image_obs: true
  wrappers:
    robomimic_image:
      normalization_path: ${normalization_path}
      low_dim_keys: ['robot0_eef_pos',
                     'robot0_eef_quat',
                     'robot0_gripper_qpos']
      image_keys: ['sideview_image',
                   'robot0_eye_in_hand_image']
      shape_meta: ${shape_meta}
      use_6d_rot: ${use_6d_rot}
    multi_step:
      n_obs_steps: ${cond_steps}
      n_action_steps: ${act_steps}
      max_episode_steps: ${env.max_episode_steps}
      reset_within_step: True

# Shape metadata for visual observations
shape_meta:
  obs:
    rgb:
      shape: [240, 240, 6]  # 2 cameras × 3 RGB channels
    state:
      shape: [9]  # proprioceptive state dimension per timestep
  action: 
    shape: [7]  # 10D for 6D rotation, 7D for axis-angle (set manually based on use_6d_rot)

wandb:
  entity: ${oc.env:DICE_RL_WANDB_ENTITY}
  project: robomimic-${env_name}-pretrain
  run: ${now:%H-%M-%S}_${name}

train:
  n_epochs: 8000
  batch_size: 64
  learning_rate: 1e-4
  weight_decay: 1e-6
  lr_scheduler:
    first_cycle_steps: 10000
    warmup_steps: 100
    min_lr: 1e-5
  epoch_start_ema: 20
  update_ema_freq: 10
  save_model_freq: 200
  render:
    freq: 2
    num: 2

model:
  _target_: model.flow_matching.flow_matching.FlowMatchingModel
  network:
    _target_: model.flow_matching.vision_resnet_mlp_flow_matching.VisionResNetFlowMatchingMLP
    num_img: 2
    spatial_emb: 64
    time_dim: 64
    dropout: 0.1
    visual_feature_dim: 128  # Visual feature dimension after fusion
    fused_feature_dim: 128 
    img_cond_steps: ${img_cond_steps}
    cond_dim: 9  # state.shape[-1] * cond_steps = 9 * 1 = 9
    horizon_steps: ${horizon_steps}
    action_dim: ${action_dim}
    img_height: 240  # Tool hang uses 240x240 images
    img_width: 240
    num_kp: 32  # Number of keypoints for spatial softmax
    unet_base_channels: 128  # Base channels for UNet
    unet_channel_mults: [1, 2, 2]  # Channel multipliers for UNet layers
    use_augmentation: true  # Enable random crop during training
    crop_height: 216  # Crop to 84x84 (same as much-ado)
    crop_width: 216
  horizon_steps: ${horizon_steps}
  obs_dim: ${obs_dim}
  action_dim: ${action_dim}
  flow_steps: ${flow_steps}
  integration_method: 'euler' # "euler" | "heun" | "rk4"
  schedule: 'linear' # "linear" | "cosine"
  t_sampling: 'uniform' # "uniform" | "beta" | "stratified"
  weight_method: 'none' # "none" | "importance"
  device: ${device}

ema:
  # decay: 0.995
  inv_gamma: 1.0
  max_value: 0.9999
  min_value: 0.0
  power: 0.75
  update_after_step: 0

train_dataset:
  _target_: agent.dataset.sequence.StitchedSequenceDataset
  use_img: true
  dataset_path: ${train_dataset_path}
  horizon_steps: ${horizon_steps}
  cond_steps: ${cond_steps}
  img_cond_steps: ${img_cond_steps}
  device: ${device}
  max_n_episodes: 50
  use_6d_rot: ${use_6d_rot}
  abs_action: ${abs_action}