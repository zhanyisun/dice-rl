defaults:
  - _self_
hydra:
  run:
    dir: ${logdir}
_target_: agent.pretrain.train_flow_matching_agent.TrainFlowMatchingAgent

name: ${env_name}_pre_flow_matching_mlp_ta${horizon_steps}_td${flow_steps}
logdir: ${oc.env:DPPO_LOG_DIR}/pusht-pretrain/${name}/${now:%Y-%m-%d}_${now:%H-%M-%S}_${seed}
train_dataset_path: data_dir/pusht/processed/train.npz
normalization_path: data_dir/pusht/processed/normalization.npz

seed: 42
device: cuda:0
# env: pusht
env_name: pusht
obs_dim: 5
action_dim: 2
flow_steps: 10
horizon_steps: 4
cond_steps: 1
act_steps: 4

env:
  n_envs: 20
  name: ${env_name}
  env_type: pusht
  best_reward_threshold_for_success: 1
  max_episode_steps: 300
  save_video: false
  success_threshold: 0.7695
  wrappers:
    pusht_state:
      normalization_path: ${normalization_path}
      success_threshold: ${env.success_threshold}
    multi_step:
      n_obs_steps: ${cond_steps}
      n_action_steps: ${act_steps}
      max_episode_steps: ${env.max_episode_steps}
      reset_within_step: True

wandb:
  entity: ${oc.env:DPPO_WANDB_ENTITY}
  project: pusht-pretrain-state
  run: ${now:%H-%M-%S}_${name}

train:
  n_epochs: 8000
  batch_size: 256
  learning_rate: 1e-4
  weight_decay: 1e-6
  lr_scheduler:
    first_cycle_steps: 10000
    warmup_steps: 100
    min_lr: 1e-5
  epoch_start_ema: 20
  update_ema_freq: 10
  save_model_freq: 1000
  render:
    freq: 5
    num: 5

model:
  _target_: model.flow_matching.flow_matching.FlowMatchingModel
  network:
    # _target_: model.diffusion.mlp_diffusion.DiffusionMLP
    # time_dim: 32
    # mlp_dims: [4096, 4096, 4096]
    # residual_style: True
    _target_: model.flow_matching.mlp_flow_matching.FlowMatchingMLP
    time_dim: 32
    hidden_dim: 128
    num_blocks: 4
    cond_dim: ${eval:'${obs_dim} * ${cond_steps}'}
    horizon_steps: ${horizon_steps}
    action_dim: ${action_dim}
  horizon_steps: ${horizon_steps}
  obs_dim: ${obs_dim}
  action_dim: ${action_dim}
  flow_steps: ${flow_steps}
  cond_steps: ${cond_steps}
  integration_method: 'euler' # "euler" | "heun" | "rk4"
  schedule: 'linear' # "linear" | "cosine"
  t_sampling: 'uniform' # "uniform" | "beta" | "stratified"
  weight_method: 'none' # "none" | "importance"
  device: ${device}

ema:
  # decay: 0.995
  inv_gamma: 1.0
  max_value: 0.9999
  min_value: 0.0
  power: 0.75
  update_after_step: 0

train_dataset:
  _target_: agent.dataset.sequence.StitchedSequenceDataset
  dataset_path: ${train_dataset_path}
  horizon_steps: ${horizon_steps}
  cond_steps: ${cond_steps}
  device: ${device}
  max_n_episodes: 50